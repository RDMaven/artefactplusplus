<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Robot {{ robot_id }}</title>
    <link rel="shortcut icon" href="/static/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/styles/robot/main.css">
    <script src="/static/scripts/imports/jquery-3.7.1.min.js"></script>
</head>

<body>
    <script>const currentRobot = {{ robot_id }};</script> <!-- TKT: loading with fastAPI replaces this with the actual id. -->
    <div class="container">
        <div class="left-panel">
            <div class="top-bar">
                <!-- <div class="return-btn"> -->
                <a href="/" class="return-btn">
                    <img src="/static/images/pizza_secrete_entiere.png" class="return-btn-img" alt="Logo Artefact+++">
                </a>
                <!-- </div> -->
                <div class="title"><strong> Dashboard Robot {{ robot_id }} </strong></div>
                <div class="btn-mode">
                    <!-- Source - https://stackoverflow.com/a/79274945 -->
                    <label class="btn-mode-toggle">
                        <input type="checkbox" id="btnMode" name="btnToggle" />
                        <span class="btn-mode-slider"></span>
                    </label>
                </div>
                <div class="btn-stop-container"><button class="btn-stop">🛑</button></div>
                <div class="btn-capture">
                    <!-- Source - https://stackoverflow.com/a/79274945 -->
                    <label class="btn-capture-toggle">
                        <input type="checkbox" id="btnCapture" name="btnToggleCapture" />
                        <span class="btn-capture-slider"></span>
                    </label>
                </div>
            </div>

            <div class="camera-area">
                <div class="map">
                    <img src="/static/images/carte_telecom.png" draggable="false" alt="Carte de Télécom">
                </div>
                <div class="camera">
                    <img src="/video/{{ robot_id }}" class="camera-feed">
                </div>
            </div>

        </div>
        <div class="right-panel">

            <div class="console-container">
                <div class="console-header">
                    Log Konsole
                    <div class="console-controls">
                        <button class="console-btn">Clear</button>
                    </div>
                </div>
                <div class="console-body"></div>
            </div>

            <div class="controls-container">
                <div class="top-controls">
                    <button id="controls-rotate-left"><img src="/static/images/rotate-left.png" draggable="false"></button>
                    <button id="controls-up"><img src="/static/images/arrow.png" draggable="false" class="rotate270"></button>
                    <button id="controls-rotate-right"><img src="/static/images/rotate-right.png" draggable="false"></button>
                </div>
                <div class="bottom-controls">
                    <button id="controls-left"><img src="/static/images/arrow.png" draggable="false" class="rotate180"></button>
                    <button id="controls-down"><img src="/static/images/arrow.png" draggable="false" class="rotate90"></button>
                    <button id="controls-right"><img src="/static/images/arrow.png" draggable="false"></button>
                </div>
            </div>
            <button class="big-button" id="ws-test-button">Test WebSocket</button>
        </div>
    </div>

    <div class="camera-buttons-container slide-open">
        <div class="camera-buttons-text">
            <h5>HELP FOR BUTTTONNS</h5>
            <br>
            <ul>
                <li>Up Arrow : Up </li>
                <li>Down Arrow : Down</li>
                <li>Left Arrow : Left</li>
                <li>Right Arrow : Right</li>
                <li>o : Reset to center</li>
            </ul>
            <br>
            Do not spam, the camera is not very reactive.

        </div>
        <div class="camera-buttons-reveal-arrow"><img src="/static/images/simple-right-arrow.png" class="rotate180" alt=""></div>
    </div>

    <script type="module" src="/static/scripts/app.js" defer></script>
</body>

</html>
