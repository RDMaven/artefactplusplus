<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Dashboard caméra</title>
    <link rel="stylesheet" href="/static/styles/app.css" type="text/css">
    <link rel="stylesheet" href="/static/styles/dashboard.css" type="text/css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

</head>

<body>

    <div class="header-wrapper">
        <h1 class="page-title">Dashboard</h1>
        <div class="map-placeholder">
            <img src="/static/images/carte_telecom.png" alt="Carte de Télécom">
        </div>
        <div class="logo-placeholder">
            <img src="/static/images/pizza_secrete_entiere.png" class="ani-spinning" alt="Logo Artefact+++">
        </div>
    </div>

    <!-- Three columns -->
    <div class="columns">

        <div class="column">
            <div class="name">Robot 1</div>
            <div class="camera-placeholder">
                <img src="/video/1" class="video">
            </div>
            <div class="status-box">Status: OK</div>
            <a class="big-button" href="/1">Contrôle Robot 1</a>
        </div>

        <div class="column">
            <div class="name">Robot 2</div>
            <div class="camera-placeholder"> 
                <img src="/video/2" class="video">
            </div>
            <div class="status-box">Status: Offline</div>
            <a class="big-button" href="2">Contrôle Robot 2</a>
        </div>

        <div class="column">
            <div class="name">Robot 3</div>
            <div class="camera-placeholder"> 
                <img src="/video/3" class="video">
            </div>
            <div class="status-box">Status: Error</div>
            <a class="big-button" href="3">Contrôle Robot 3</a>
        </div>

    </div>
    <script type="module" src="/static/scripts/app.js" defer></script>

</body>

</html>
