<!DOCTYPE html>
<html>

<head>
    <title>Map Constructor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/map_build.css" />
    <link rel="stylesheet" type="text/css" href="/header.css" />
    <link rel="icon" href="/src/logo.svg">
</head>

<body>
    <header>
        <div id="header_content">
            <img src="/src/logo_header.svg" id="logo">
            <div id="title1_container">
                <p id="title1">Map Constructor</p>
                <p id="title_date">Since 2026</p>
            </div>
            <div id="language">
                <a href="/">fr</a>
                <p> | </p>
                <a href="/en">en</a>
            </div>
        </div>
    </header>
    <div id="main_content">
        <p id="main_title">Création de carte :</p>
        <div id="part_1">
            <div id="picture_done">
                <p>Déposez ici votre fichier (image)...</p>
            </div>
            <div id="File">
                <input type="file" id="fileInput" hidden>
                <div id="buttonFile">
                    <p>Sélectionner un fichier</p>
                </div>
                <div id="buttonExport">
                    <p>Test_Export</p>
                </div>
                <div id="fileList">

                </div>
            </div>
            <p> ATTENTION IL FAUT VÉRIFIER LE NOM DU PROJET (POUR QUE L'EXPORT SE FASSE) LORS DE LA CRÉATION DE CE DERNIER</p>
        </div>
    </div>
</body>
<script src="/script/script_map.js"></script>

</html>
